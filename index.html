<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeded Glass - Poster Effect</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap");

      body {
        margin: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        touch-action: none;
        font-family: "Inter", sans-serif;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .poster-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        box-sizing: border-box;
        padding: 5vw;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .main-title {
        color: #e2ff00;
        font-size: clamp(3.5rem, 8vw, 7rem);
        font-weight: 700;
        line-height: 0.85;
        letter-spacing: -0.04em;
        margin: 0;
      }

      .subtitle {
        color: #e2ff00;
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.02em;
        margin-top: 1.5rem;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <!-- Typography layer -->
    <div class="poster-ui">
      <h1 class="main-title">Reeded<br />Glass</h1>
      <div class="subtitle">Displacement<br />System</div>
    </div>

    <!-- 3D Layer -->
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GUI } from "three/addons/libs/lil-gui.module.min.js";

      // --- SCENE SETUP ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#0a0a0a");

      // Camera
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0, 2);

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // Mouse tracking
      const mouse = { x: 0, y: 0 };
      const targetCamera = { x: 0, y: 0 };

      window.addEventListener("mousemove", (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = (event.clientY / window.innerHeight) * 2 - 1;
      });

      window.addEventListener("touchmove", (event) => {
        if (event.touches.length > 0) {
          mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
          mouse.y = (event.touches[0].clientY / window.innerHeight) * 2 - 1;
        }
      });

      // Lighting
      const ambientLight = new THREE.AmbientLight("#ffffff", 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight("#ffffff", 1.5);
      dirLight.position.set(5, 5, 5);
      scene.add(dirLight);

      // --- RENDER TARGET SETUP  ---
      const renderTarget = new THREE.WebGLRenderTarget(
        window.innerWidth * window.devicePixelRatio,
        window.innerHeight * window.devicePixelRatio,
        {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
        },
      );

      // --- BACKGROUND OBJECTS ---
      const textureLoader = new THREE.TextureLoader();
      const bgTexture = textureLoader.load("4.jpg");
      bgTexture.colorSpace = THREE.SRGBColorSpace;

      const torusKnotGeo = new THREE.PlaneGeometry(3.6, 4.8);
      const torusKnotMat = new THREE.MeshBasicMaterial({
        map: bgTexture,
      });

      const backgroundMesh = new THREE.Mesh(torusKnotGeo, torusKnotMat);
      const backgroundMeshCopy = new THREE.Mesh(torusKnotGeo, torusKnotMat);

      backgroundMesh.position.set(0, 0, -0.5);
      scene.add(backgroundMesh);

      // --- CONFIGURATION OBJECT ---
      const config = {
        stripesCount: 24.0,
        refractionStrength: 0.35,
        blurStrength: 2.0,
        shatterX: 0.2,
        shatterY: 0.35,
        glassColor: "#ffffff",
        glassOpacity: 0.0,
        grainStrength: 0.05,
        mouseIntensityX: 0.4,
        mouseIntensityY: 0.3,
        mouseEase: 0.05,
      };

      // --- CUSTOM REED GLASS SHADER ---
      const vertexShader = `
        varying vec2 vUv;
        varying vec4 vScreenPosition;

        void main() {
          vUv = uv;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mvPosition;
          vScreenPosition = gl_Position;
        }
      `;

      const fragmentShader = `
        varying vec2 vUv;
        varying vec4 vScreenPosition;

        uniform sampler2D uTransmissionMap;

        uniform float uStripesCount;

        uniform float uRefractionStrength;
        uniform float uBlurStrength;

        uniform float uShatterX;
        uniform float uShatterY;

        uniform vec3 uGlassColor;
        uniform float uGlassOpacity;
        uniform float uGrainStrength;


        vec2 hash12(float p) {
          vec3 p3 = fract(vec3(p) * vec3(.1031, .1136, .1377));
          p3 += dot(p3, p3.yzx + 19.19);
          return fract((p3.xx + p3.yz) * p3.zy) * 2.0 - 1.0;
        }

        float screenNoise(vec2 uv) {
          return fract(sin(dot(uv.xy, vec2(12.9898, 78.233))) * 43758.5453123);
        }

        void main() {
          vec2 screenUV = (vScreenPosition.xy / vScreenPosition.w) * 0.5 + 0.5;

          // Assign ID to each stripe
          float stripeIndex = floor(vUv.x * uStripesCount);
          // Divide into stripes
          float stripeX = fract(vUv.x * uStripesCount);

          // Generate offset for each stripe
          vec2 shatterOffset = hash12(stripeIndex);

          // Add refraction
          float refractionOffset = sin((stripeX - 0.5) * 3.14159265);

          vec2 distortedUV = screenUV;

          // X offset
          distortedUV.x += shatterOffset.x * uShatterX * 0.1;
          distortedUV.x += refractionOffset * uRefractionStrength * 0.1;

          // Y Offset
          distortedUV.y += shatterOffset.y * uShatterY * 0.1;

          // Take texture samples
          vec4 textureBlur = vec4(0.0);
          float blurStep = uBlurStrength * 0.001;

          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, -blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, -blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV) * 2.0;
          textureBlur /= 6.0;

          // Base tinted color for the glass plane
          vec3 baseColor = mix(textureBlur.rgb, uGlassColor, uGlassOpacity);

          // Add grain
          float noise = screenNoise(gl_FragCoord.xy);
          baseColor += (noise - 0.5) * uGrainStrength;

          vec3 finalColor = baseColor;

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `;

      // Cover entire viewport
      const glassGeo = new THREE.PlaneGeometry(5, 5);
      const glassMat = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
          uTransmissionMap: { value: null },
          uStripesCount: { value: config.stripesCount },
          uRefractionStrength: { value: config.refractionStrength },
          uBlurStrength: { value: config.blurStrength },
          uShatterX: { value: config.shatterX },
          uShatterY: { value: config.shatterY },
          uGlassColor: { value: new THREE.Color(config.glassColor) },
          uGlassOpacity: { value: config.glassOpacity },
          uGrainStrength: { value: config.grainStrength },
        },
        transparent: false,
      });

      const glassMesh = new THREE.Mesh(glassGeo, glassMat);
      glassMesh.position.set(0, 0, 0.5);
      scene.add(glassMesh);

      // --- GUI CONFIGURATION ---
      const gui = new GUI({ title: "Glass Parameters" });

      const folderMouse = gui.addFolder("Mouse Camera Tracking");
      folderMouse.add(config, "mouseIntensityX", 0, 2).name("Range X");
      folderMouse.add(config, "mouseIntensityY", 0, 2).name("Range Y");
      folderMouse.add(config, "mouseEase", 0.01, 0.2).name("Smoothness");

      gui
        .add(config, "stripesCount", 5, 50, 1)
        .name("Number of stripes")
        .onChange((v) => (glassMat.uniforms.uStripesCount.value = v));
      gui
        .add(config, "refractionStrength", 0.0, 1.0)
        .name("Refraction strength")
        .onChange((v) => (glassMat.uniforms.uRefractionStrength.value = v));
      gui
        .add(config, "blurStrength", 0.0, 10.0)
        .name("Frosted blur")
        .onChange((v) => (glassMat.uniforms.uBlurStrength.value = v));
      gui
        .add(config, "shatterX", 0.0, 1.0)
        .name("Shatter displacement X")
        .onChange((v) => (glassMat.uniforms.uShatterX.value = v));
      gui
        .add(config, "shatterY", 0.0, 1.0)
        .name("Shatter displacement Y")
        .onChange((v) => (glassMat.uniforms.uShatterY.value = v));
      gui
        .addColor(config, "glassColor")
        .name("Glass tint color")
        .onChange((v) => glassMat.uniforms.uGlassColor.value.set(v));

      gui
        .add(config, "glassOpacity", 0.0, 1.0)
        .name("Glass tint opacity")
        .onChange((v) => (glassMat.uniforms.uGlassOpacity.value = v));

      gui
        .add(config, "grainStrength", 0.0, 0.2)
        .name("Grain roughness")
        .onChange((v) => (glassMat.uniforms.uGrainStrength.value = v));

      // Resize handler
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderTarget.setSize(
          window.innerWidth * window.devicePixelRatio,
          window.innerHeight * window.devicePixelRatio,
        );
      });

      // --- ANIMATION & TWO-PASS RENDER LOOP ---
      function animate() {
        requestAnimationFrame(animate);

        // Background animation
        backgroundMesh.position.x = Math.sin(performance.now() * 0.0005) * 0.2;
        backgroundMesh.position.y = Math.cos(performance.now() * 0.0005) * 0.1;

        backgroundMesh.position.x = 0.0;
        backgroundMesh.position.y = 0.0;

        // Camera lerp
        targetCamera.x = mouse.x * config.mouseIntensityX;
        targetCamera.y = mouse.y * config.mouseIntensityY;

        camera.position.x +=
          (targetCamera.x - camera.position.x) * config.mouseEase;
        camera.position.y +=
          (targetCamera.y - camera.position.y) * config.mouseEase;

        // Camera focus on the scene center
        camera.lookAt(0, 0, 0);

        // Render background only to the renderTarget buffer
        glassMesh.visible = false;
        renderer.setRenderTarget(renderTarget);
        renderer.render(scene, camera);

        // Pass rendered background to the shader and apply glass effect
        glassMat.uniforms.uTransmissionMap.value = renderTarget.texture;
        glassMesh.visible = true;
        renderer.setRenderTarget(null);
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
