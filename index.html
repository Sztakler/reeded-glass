<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeded Glass - Poster Effect</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap");

      body {
        margin: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        touch-action: none;
        font-family: "Inter", sans-serif;
        color: #e2ff00;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .poster-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        box-sizing: border-box;
        padding: 5vw;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .main-title {
        font-size: clamp(3.5rem, 8vw, 7rem);
        font-weight: 700;
        line-height: 0.85;
        letter-spacing: -0.04em;
        margin: 0;
      }

      .subtitle {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.02em;
        margin-top: 1.5rem;
        max-width: 400px;
      }

      .upload-container {
        position: absolute;
        bottom: 5vw;
        left: 5vw;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 15ch;
        text-align: center;
        width: 100%;
      }

      .custom-file-upload {
        padding: 10px 16px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 0.85rem;
        backdrop-filter: blur(5px);
        width: fit-content;
        min-width: 16ch;
      }

      .upload-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .preview-box {
        width: 60px;
        height: 60px;
        width: auto;
        position: relative;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .preview-box img {
        width: auto;
        height: 100%;
        max-width: 200px;
        object-fit: cover;
        border-radius: 4px;
      }

      .remove-btn {
        background: #dc232c;
        color: #f7e9f9;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Typography layer -->
    <div class="poster-ui">
      <h1 class="main-title">Reeded<br />Glass</h1>
      <div class="subtitle">Displacement<br />System</div>
    </div>

    <!-- Files upload -->
    <div class="upload-container">
      <div class="upload-group">
        <label class="custom-file-upload">
          <input
            type="file"
            id="upload-bottom"
            accept="image/*"
            style="display: none"
          />
          Bottom image
        </label>
        <div id="bottom-preview" class="preview-box"></div>
      </div>

      <div class="upload-group">
        <label class="custom-file-upload">
          <input
            type="file"
            id="upload-top"
            accept="image/*"
            style="display: none"
          />
          Top image
        </label>
        <div id="top-preview" class="preview-box"></div>
      </div>
    </div>
    <!-- 3D Layer -->
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GUI } from "three/addons/libs/lil-gui.module.min.js";

      // --- SCENE SETUP ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#0a0a0a");

      // Camera
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0, 2);

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.domElement.id = "canvas";
      container.appendChild(renderer.domElement);

      // Mouse tracking
      const mouse = { x: 0, y: 0 };
      const targetCamera = { x: 0, y: 0 };

      window.addEventListener("mousemove", (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = (event.clientY / window.innerHeight) * 2 - 1;
      });

      window.addEventListener("touchmove", (event) => {
        if (event.touches.length > 0) {
          mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
          mouse.y = (event.touches[0].clientY / window.innerHeight) * 2 - 1;
        }
      });

      // Lighting
      const ambientLight = new THREE.AmbientLight("#ffffff", 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight("#ffffff", 1.5);
      dirLight.position.set(5, 5, 5);
      scene.add(dirLight);

      // --- RENDER TARGET SETUP  ---
      const renderTarget = new THREE.WebGLRenderTarget(
        window.innerWidth * window.devicePixelRatio,
        window.innerHeight * window.devicePixelRatio,
        {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
        },
      );

      // --- BACKGROUND OBJECTS ---
      const textureLoader = new THREE.TextureLoader();

      // Group with all background elements
      const backgroundGroup = new THREE.Group();
      scene.add(backgroundGroup);

      // Bottom image
      const bottomTexture = textureLoader.load("images/blob.png");
      bottomTexture.colorSpace = THREE.SRGBColorSpace;

      const bottomGeo = new THREE.PlaneGeometry(6, 4.8);
      const bottomMat = new THREE.MeshBasicMaterial({
        map: bottomTexture,
        transparent: true,
      });
      const bottomMesh = new THREE.Mesh(bottomGeo, bottomMat);
      bottomMesh.position.set(0, 0, -0.6); // Placed furthest back
      backgroundGroup.add(bottomMesh);

      // Top Image
      const topTexture = textureLoader.load("images/signet.svg");
      topTexture.colorSpace = THREE.SRGBColorSpace;

      const topGeo = new THREE.PlaneGeometry(2.5, 2.5);
      const topMat = new THREE.MeshBasicMaterial({
        map: topTexture,
        transparent: true,
      });
      const topMesh = new THREE.Mesh(topGeo, topMat);
      topMesh.position.set(0, 0, -0.55);
      backgroundGroup.add(topMesh);

      // --- CONFIGURATION OBJECT ---
      const config = {
        stripesCount: 24.0,
        refractionStrength: 0.35,
        blurStrength: 2.0,
        shatterX: 0.2,
        shatterY: 0.35,
        glassColor: "#ffffff",
        glassOpacity: 0.0,
        grainStrength: 0.05,
        mouseIntensityX: 0.4,
        mouseIntensityY: 0.3,
        mouseEase: 0.05,
        autoSpeed: 0.001,
        autoIntensityX: 0.15,
        autoIntensityY: 0.1,
        cameraDistance: 3.0,
        textColor: "#e2ff00",
        autoColor: false,
      };

      // --- CUSTOM REED GLASS SHADER ---
      const vertexShader = `
            varying vec2 vUv;
            varying vec4 vScreenPosition;

            void main() {
              vUv = uv;
              vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
              gl_Position = projectionMatrix * mvPosition;
              vScreenPosition = gl_Position;
            }
          `;

      const fragmentShader = `
            varying vec2 vUv;
            varying vec4 vScreenPosition;

            uniform sampler2D uTransmissionMap;

            uniform float uStripesCount;

            uniform float uRefractionStrength;
            uniform float uBlurStrength;

            uniform float uShatterX;
            uniform float uShatterY;

            uniform vec3 uGlassColor;
            uniform float uGlassOpacity;
            uniform float uGrainStrength;


            vec2 hash12(float p) {
              vec3 p3 = fract(vec3(p) * vec3(.1031, .1136, .1377));
              p3 += dot(p3, p3.yzx + 19.19);
              return fract((p3.xx + p3.yz) * p3.zy) * 2.0 - 1.0;
            }

            float screenNoise(vec2 uv) {
              return fract(sin(dot(uv.xy, vec2(12.9898, 78.233))) * 43758.5453123);
            }

            void main() {
              vec2 screenUV = (vScreenPosition.xy / vScreenPosition.w) * 0.5 + 0.5;

              // Assign ID to each stripe
              float stripeIndex = floor(vUv.x * uStripesCount);
              // Divide into stripes
              float stripeX = fract(vUv.x * uStripesCount);

              // Generate offset for each stripe
              vec2 shatterOffset = hash12(stripeIndex);

              // Add refraction
              float refractionOffset = sin((stripeX - 0.5) * 3.14159265);

              vec2 distortedUV = screenUV;

              // X offset
              distortedUV.x += shatterOffset.x * uShatterX * 0.1;
              distortedUV.x += refractionOffset * uRefractionStrength * 0.1;

              // Y Offset
              distortedUV.y += shatterOffset.y * uShatterY * 0.1;

              // Take texture samples
              vec4 textureBlur = vec4(0.0);
              float blurStep = uBlurStrength * 0.001;

              textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, -blurStep));
              textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, -blurStep));
              textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, blurStep));
              textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, blurStep));
              textureBlur += texture2D(uTransmissionMap, distortedUV) * 2.0;
              textureBlur /= 6.0;

              // Base tinted color for the glass plane
              vec3 baseColor = mix(textureBlur.rgb, uGlassColor, uGlassOpacity);

              // Add grain
              float noise = screenNoise(gl_FragCoord.xy);
              baseColor += (noise - 0.5) * uGrainStrength;

              vec3 finalColor = baseColor;

              gl_FragColor = vec4(finalColor, 1.0);
            }
          `;

      // Cover entire viewport
      const glassGeo = new THREE.PlaneGeometry(5, 5);
      const glassMat = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
          uTransmissionMap: { value: null },
          uStripesCount: { value: config.stripesCount },
          uRefractionStrength: { value: config.refractionStrength },
          uBlurStrength: { value: config.blurStrength },
          uShatterX: { value: config.shatterX },
          uShatterY: { value: config.shatterY },
          uGlassColor: { value: new THREE.Color(config.glassColor) },
          uGlassOpacity: { value: config.glassOpacity },
          uGrainStrength: { value: config.grainStrength },
        },
        transparent: false,
      });

      const glassMesh = new THREE.Mesh(glassGeo, glassMat);
      glassMesh.position.set(0, 0, 0.5);
      scene.add(glassMesh);

      // --- GUI CONFIGURATION ---
      const gui = new GUI({ title: "Settings" });

      const folderCamera = gui.addFolder("Camera Settings");
      folderCamera.add(config, "mouseIntensityX", 0, 2).name("Range X");
      folderCamera.add(config, "mouseIntensityY", 0, 2).name("Range Y");
      folderCamera.add(config, "mouseEase", 0.01, 0.2).name("Smoothness");
      folderCamera.add(config, "autoSpeed", 0, 0.005).name("Auto Speed");
      folderCamera.add(config, "autoIntensityX", 0, 0.5).name("Auto Range X");
      folderCamera.add(config, "autoIntensityY", 0, 0.5).name("Auto Range Y");
      folderCamera.add(config, "cameraDistance", 0, 10).name("Camera distance");

      const folderGlass = gui.addFolder("Glass Parameters");

      folderGlass
        .add(config, "stripesCount", 5, 50, 1)
        .name("Number of stripes")
        .onChange((v) => (glassMat.uniforms.uStripesCount.value = v));
      folderGlass
        .add(config, "refractionStrength", 0.0, 1.0)
        .name("Refraction strength")
        .onChange((v) => (glassMat.uniforms.uRefractionStrength.value = v));
      folderGlass
        .add(config, "blurStrength", 0.0, 10.0)
        .name("Frosted blur")
        .onChange((v) => (glassMat.uniforms.uBlurStrength.value = v));
      folderGlass
        .add(config, "shatterX", 0.0, 1.0)
        .name("Shatter displacement X")
        .onChange((v) => (glassMat.uniforms.uShatterX.value = v));
      folderGlass
        .add(config, "shatterY", 0.0, 1.0)
        .name("Shatter displacement Y")
        .onChange((v) => (glassMat.uniforms.uShatterY.value = v));
      folderGlass
        .addColor(config, "glassColor")
        .name("Glass tint color")
        .onChange((v) => glassMat.uniforms.uGlassColor.value.set(v));

      folderGlass
        .add(config, "glassOpacity", 0.0, 1.0)
        .name("Glass tint opacity")
        .onChange((v) => (glassMat.uniforms.uGlassOpacity.value = v));

      folderGlass
        .add(config, "grainStrength", 0.0, 0.2)
        .name("Grain roughness")
        .onChange((v) => (glassMat.uniforms.uGrainStrength.value = v));

      let colorController;

      const folderText = gui.addFolder("Text Parameters");
      colorController = folderText
        .addColor(config, "textColor")
        .name("Text Color")
        .onChange((v) => {
          document.querySelector("body").style.color = v;
        });
      folderText.add(config, "autoColor").name("Text color from image");

      const folderSave = gui.addFolder("Export/Import");
      folderSave.add({ save: saveConfig }, "save").name("Save Config (.json)");

      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = ".json";
      fileInput.style.display = "none";
      fileInput.onchange = loadConfig;

      folderSave
        .add({ load: () => fileInput.click() }, "load")
        .name("Load Config");

      // Resize handler
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderTarget.setSize(
          window.innerWidth * window.devicePixelRatio,
          window.innerHeight * window.devicePixelRatio,
        );
      });

      function handleFileUpload(event, targetMaterial, previewId) {
        const file = event.target.files[0];
        const previewContainer = document.getElementById(previewId);

        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const image = new Image();
          image.onload = function () {
            if (config.autoColor) {
              const hslValues = getDominantColor(image);
              const hexString = hslToHex(hslValues.h, hslValues.s, hslValues.l);

              document.querySelector("body").style.color = hexString;

              config.textColor = hexString;

              if (colorController) colorController.updateDisplay();
            }

            const newTexture = new THREE.Texture(image);
            newTexture.colorSpace = THREE.SRGBColorSpace;
            newTexture.needsUpdate = true;

            if (targetMaterial.map) targetMaterial.map.dispose();
            targetMaterial.map = newTexture;
            targetMaterial.visible = true;

            // Render thumbnail
            previewContainer.innerHTML = `
            <img src="${e.target.result}" />
            <div class="remove-btn">x</div>
          `;

            // Clear texture and preview thumbnail
            previewContainer.querySelector(".remove-btn").onclick = () => {
              targetMaterial.map = null;
              targetMaterial.visible = false;
              previewContainer.innerHTML = "";
            };
          };
          image.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Handle file events
      document
        .getElementById("upload-bottom")
        .addEventListener("change", (e) =>
          handleFileUpload(e, bottomMat, "bottom-preview"),
        );
      document
        .getElementById("upload-top")
        .addEventListener("change", (e) =>
          handleFileUpload(e, topMat, "top-preview"),
        );

      function getDominantColor(imgElement) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = 50;
        canvas.height = 50;
        context.drawImage(imgElement, 0, 0, 50, 50);

        const data = context.getImageData(0, 0, 50, 50).data;
        let r = 0,
          g = 0,
          b = 0;

        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
        }

        const count = data.length / 4;
        const hslColor = calculateHightContrastHSL(
          Math.floor(r / count),
          Math.floor(g / count),
          Math.floor(b / count),
        );

        return hslColor;
      }

      function hslToHex(h, s, l) {
        l /= 100;
        const a = (s * Math.min(l, 1 - l)) / 100;
        const f = (n) => {
          const k = (n + h / 30) % 12;
          const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
          return Math.round(255 * color)
            .toString(16)
            .padStart(2, "0");
        };
        return `#${f(0)}${f(8)}${f(4)}`;
      }

      function calculateHightContrastHSL(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b),
          min = Math.min(r, g, b);
        let h,
          s,
          l = (max + min) / 2;

        if (max === min) {
          h = s = 0;
        } else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r:
              h = (g - b) / d + (g < b ? 6 : 0);
              break;
            case g:
              h = (b - r) / d + 2;
              break;
            case b:
              h = (r - g) / d + 4;
              break;
          }
          h /= 6;
        }

        return {
          h: Math.floor(h * 360),
          s: 100,
          l: 60,
        };
      }

      function saveConfig() {
        const exportData = {
          ...config,
          bottomImage:
            document.querySelector("#bottom-preview img")?.src || null,
          topImage: document.querySelector("#top-preview img")?.src || null,
        };

        const blob = new Blob([JSON.stringify(exportData, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "config.json";
        a.click();
      }

      function loadConfig(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const data = JSON.parse(e.target.result);

          Object.assign(config, data);

          // Update shader uniforms
          glassMat.uniforms.uStripesCount.value = config.stripesCount;
          glassMat.uniforms.uRefractionStrength.value =
            config.refractionStrength;
          glassMat.uniforms.uBlurStrength.value = config.blurStrength;
          glassMat.uniforms.uShatterX.value = config.shatterX;
          glassMat.uniforms.uShatterY.value = config.shatterY;
          glassMat.uniforms.uGlassColor.value.set(config.glassColor);
          glassMat.uniforms.uGlassOpacity.value = config.glassOpacity;
          glassMat.uniforms.uGrainStrength.value = config.grainStrength;

          // Update text color
          document.querySelector("body").style.color = config.textColor;

          // Update GUI
          gui.controllersRecursive().forEach((c) => c.updateDisplay());

          // Load images
          const updateTexture = (src, mat, previewId) => {
            if (!src) return;
            const img = new Image();
            img.onload = () => {
              const tex = new THREE.Texture(img);
              tex.colorSpace = THREE.SRGBColorSpace;
              tex.needsUpdate = true;
              if (mat.map) mat.map.dispose();
              mat.map = tex;
              mat.visible = true;
              document.getElementById(previewId).innerHTML =
                `<img src="${src}" /><div class="remove-btn">x</div>`;
            };
            img.src = src;
          };

          updateTexture(data.bottomImage, bottomMat, "bottom-preview");
          updateTexture(data.topImage, topMat, "top-preview");
        };
        reader.readAsText(file);
      }
      // --- ANIMATION & TWO-PASS RENDER LOOP ---
      function animate() {
        requestAnimationFrame(animate);

        // Camera drift loop (Lemniscate of Bernoulli)
        const time = performance.now() * config.autoSpeed;
        const autoX = Math.sin(time) * config.autoIntensityX;
        const autoY = (Math.sin(time * 2) / 2) * config.autoIntensityY;

        // Camera lerp
        targetCamera.x = mouse.x * config.mouseIntensityX + autoX;
        targetCamera.y = mouse.y * config.mouseIntensityY + autoY;

        camera.position.x +=
          (targetCamera.x - camera.position.x) * config.mouseEase;
        camera.position.y +=
          (targetCamera.y - camera.position.y) * config.mouseEase;

        camera.position.z = config.cameraDistance;

        // Camera focus on the scene center
        camera.lookAt(0, 0, 0);

        // Render background only to the renderTarget buffer
        glassMesh.visible = false;
        renderer.setRenderTarget(renderTarget);
        renderer.render(scene, camera);

        // Pass rendered background to the shader and apply glass effect
        glassMat.uniforms.uTransmissionMap.value = renderTarget.texture;
        glassMesh.visible = true;
        renderer.setRenderTarget(null);
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
