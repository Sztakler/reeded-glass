<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeded Glass - Poster Effect</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap");

      body {
        margin: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        touch-action: none;
        font-family: "Inter", sans-serif;
        color: #e2ff00;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .poster-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        box-sizing: border-box;
        padding: 5vw;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .main-title {
        font-size: clamp(3.5rem, 8vw, 7rem);
        font-weight: 700;
        line-height: 0.85;
        letter-spacing: -0.04em;
        margin: 0;
      }

      .subtitle {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.02em;
        margin-top: 1.5rem;
        max-width: 400px;
      }

      .upload-container {
        position: absolute;
        bottom: 5vw;
        left: 5vw;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 15ch;
        text-align: center;
        width: 100%;
      }

      .custom-file-upload {
        padding: 10px 16px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 0.85rem;
        backdrop-filter: blur(5px);
        width: fit-content;
        min-width: 16ch;
      }

      .upload-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .preview-box {
        width: 60px;
        height: 60px;
        width: auto;
        position: relative;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .preview-box img {
        width: auto;
        height: 100%;
        max-width: 200px;
        object-fit: cover;
        border-radius: 4px;
      }

      .remove-btn {
        background: #dc232c;
        color: #f7e9f9;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Typography layer -->
    <div class="poster-ui" style="display: none">
      <h1 class="main-title">Reeded<br />Glass</h1>
      <div class="subtitle">Displacement<br />System</div>
    </div>

    <!-- Files upload -->
    <div class="upload-container">
      <div class="upload-group">
        <label class="custom-file-upload" style="display: none">
          <input
            type="file"
            id="upload-bottom"
            accept="image/*"
            style="display: none"
          />
          Bottom image
        </label>
        <div id="bottom-preview" class="preview-box"></div>
      </div>

      <div class="upload-group">
        <label class="custom-file-upload">
          <input
            type="file"
            id="upload-top"
            accept="image/*"
            style="display: none"
          />
          Shader mask
        </label>
        <div id="top-preview" class="preview-box"></div>
      </div>
    </div>
    <!-- 3D Layer -->
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GUI } from "three/addons/libs/lil-gui.module.min.js";

      // ======================================================
      // CONFIG
      // ======================================================

      const config = {
        stripesCount: 60,

        reedStrength: 0.015,
        noiseStrength: 0.08,
        noiseScale: 3.5,

        chromaticStrength: 0.002,

        blurStrength: 2.0,

        glassColor: "#ffffff",
        glassOpacity: 0.05,

        grainStrength: 0.04,
        logoScale: 0.8,
        warpStrength: 0.6,
      };
      // ======================================================
      // RENDERER
      // ======================================================

      const container = document.getElementById("canvas-container");

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
      });

      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

      renderer.setSize(innerWidth, innerHeight);

      container.appendChild(renderer.domElement);

      // ======================================================
      // CAMERAS
      // ======================================================

      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);

      camera.position.z = 1;

      // ======================================================
      // SOURCE SCENE
      // TU BĘDĄ TWOJE OBIEKTY
      // ======================================================

      const scene = new THREE.Scene();

      scene.background = new THREE.Color("#0a0a0a");

      const noiseTarget = new THREE.WebGLRenderTarget(256, 256, {
        format: THREE.RGBAFormat,
        type: THREE.FloatType,
      });

      const noiseFragmentShader = `
          uniform float uTime;
          varying vec2 vUv;

          //
          // Description : Array and textureless GLSL 2D simplex noise function.
          //      Author : Ian McEwan, Ashima Arts.
          //  Maintainer : stegu
          //     Lastmod : 20110822 (ijm)
          //     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
          //               Distributed under the MIT License. See LICENSE file.
          //               https://github.com/ashima/webgl-noise
          //               https://github.com/stegu/webgl-noise
          //

          vec3 mod289(vec3 x) {
            return x - floor(x * (1.0 / 289.0)) * 289.0;
          }

          vec2 mod289(vec2 x) {
            return x - floor(x * (1.0 / 289.0)) * 289.0;
          }

          vec3 permute(vec3 x) {
            return mod289(((x*34.0)+10.0)*x);
          }

          float snoise(vec2 v)
            {
            const vec4 C = vec4(0.211324865405187,  // (3.0-sqrt(3.0))/6.0
                                0.366025403784439,  // 0.5*(sqrt(3.0)-1.0)
                               -0.577350269189626,  // -1.0 + 2.0 * C.x
                                0.024390243902439); // 1.0 / 41.0
          // First corner
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);

          // Other corners
            vec2 i1;
            //i1.x = step( x0.y, x0.x ); // x0.x > x0.y ? 1.0 : 0.0
            //i1.y = 1.0 - i1.x;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            // x0 = x0 - 0.0 + 0.0 * C.xx ;
            // x1 = x0 - i1 + 1.0 * C.xx ;
            // x2 = x0 - 1.0 + 2.0 * C.xx ;
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;

          // Permutations
            i = mod289(i); // Avoid truncation effects in permutation
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
          		+ i.x + vec3(0.0, i1.x, 1.0 ));

            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ;
            m = m*m ;

          // Gradients: 41 points uniformly over a line, mapped onto a diamond.
          // The ring size 17*17 = 289 is close to a multiple of 41 (41*7 = 287)

            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;

          // Normalise gradients implicitly by scaling m
          // Approximation of: m *= inversesqrt( a0*a0 + h*h );
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );

          // Compute final noise value at P
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
          }

          void main() {
              float nx = snoise(vUv * 3.0 + uTime * 0.2);
              float ny = snoise(vUv * 3.0 + uTime * 0.3);
              gl_FragColor = vec4(nx * 0.5 + 0.5, ny * 0.5 + 0.5, 0.0, 1.0);
          }
      `;

      const textureLoader = new THREE.TextureLoader();

      const logoTexture = textureLoader.load("./images/logo.png");

      logoTexture.minFilter = THREE.LinearFilter;
      logoTexture.magFilter = THREE.LinearFilter;
      logoTexture.wrapS = THREE.ClampToEdgeWrapping;
      logoTexture.wrapT = THREE.ClampToEdgeWrapping;

      // ======================================================
      // RENDER TARGET
      // ======================================================

      const renderTarget = new THREE.WebGLRenderTarget(
        innerWidth,
        innerHeight,
        {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
          depthBuffer: false,
        },
      );

      // ======================================================
      // FULLSCREEN QUAD
      // ======================================================

      const quadScene = new THREE.Scene();

      const quadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      // ======================================================
      // GLASS SHADER
      // ======================================================

      const vertexShader = `
                  varying vec2 vUv;
                  void main() {
                      vUv = uv;
                      gl_Position = vec4(position, 1.0);
                  }
              `;

      const fragmentShader = `
                  precision highp float;
                  varying vec2 vUv;
                  uniform sampler2D uScene;
                  uniform vec2 uResolution;
                  uniform float uTime;
                  uniform float uStripesCount;
                  uniform float uReedStrength;
                  uniform float uChromaticStrength;
                  uniform float uBlurStrength;
                  uniform vec3 uGlassColor;
                  uniform float uGlassOpacity;
                  uniform float uGrainStrength;

                  float hash(vec2 p) {
                      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
                  }

                  vec3 blur(sampler2D tex, vec2 uv, float amount) {
                      vec2 px = vec2(amount / uResolution.x, 0.0);
                      vec3 col = texture2D(tex, uv).rgb * 0.4;
                      col += (texture2D(tex, uv + px).rgb + texture2D(tex, uv - px).rgb) * 0.15;
                      col += (texture2D(tex, uv + px * 2.0).rgb + texture2D(tex, uv - px * 2.0).rgb) * 0.15;
                      return col;
                  }

                  void main() {
                      float x = fract(vUv.x * uStripesCount) * 2.0 - 1.0;
                      float distSq = x * x;
                      vec2 normal = vec2(x, sqrt(max(0.001, 1.0 - distSq)));

                      vec2 distortion = normal * uReedStrength * 0.5;
                      vec2 uv = vUv + distortion;

                      // Chromatic Aberration
                      vec2 chroma = normal * uChromaticStrength;
                      float r = texture2D(uScene, uv + chroma).r;
                      float g = texture2D(uScene, uv).g;
                      float b = texture2D(uScene, uv - chroma).b;

                      vec3 color = mix(vec3(r, g, b), blur(uScene, uv, uBlurStrength), 0.25);
                      color = mix(color, uGlassColor, uGlassOpacity);
                      color += (hash(gl_FragCoord.xy + uTime) - 0.5) * uGrainStrength;

                      // Highlights and Shadows
                      vec3 reflection = texture2D(uScene, uv + (normal * 0.1)).rgb;
                      float edgeHighlight = pow(abs(normal.x), 2.0);
                      color = mix(color, reflection * 1.5, edgeHighlight * 0.3);

                      gl_FragColor = vec4(color, 1.0);
                  }
              `;

      // ======================================================
      // MATERIAL
      // ======================================================

      const glassMaterial = new THREE.ShaderMaterial({
        vertexShader,

        fragmentShader,

        uniforms: {
          uScene: {
            value: null,
          },

          uResolution: {
            value: new THREE.Vector2(innerWidth, innerHeight),
          },

          uTime: {
            value: 0,
          },

          uStripesCount: {
            value: config.stripesCount,
          },

          uReedStrength: {
            value: config.reedStrength,
          },

          uChromaticStrength: {
            value: config.chromaticStrength,
          },
          uBlurStrength: {
            value: config.blurStrength,
          },

          uGlassColor: {
            value: new THREE.Color(config.glassColor),
          },

          uGlassOpacity: {
            value: config.glassOpacity,
          },

          uGrainStrength: {
            value: config.grainStrength,
          },
        },
      });

      const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), glassMaterial);

      quadScene.add(quad);

      function createGradientTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 512;
        canvas.height = 1;
        const ctx = canvas.getContext("2d");

        const grad = ctx.createLinearGradient(0, 0, 512, 0);

        grad.addColorStop(0.0, "rgb(8, 6, 5)");
        grad.addColorStop(0.2, "rgb(40, 10, 5)");
        grad.addColorStop(0.45, "rgb(180, 50, 20)");
        grad.addColorStop(0.6, "rgb(241, 22, 3)");
        grad.addColorStop(0.8, "rgb(243, 217, 137)");

        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 1);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        return texture;
      }

      const gradientTexture = createGradientTexture();

      const gradientMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: {
            value: 0,
          },
          uNoiseMap: {
            value: noiseTarget.texture,
          },
          uWarpStrength: { value: config.warpStrength },
          uLogo: {
            value: logoTexture,
          },
          uLogoScale: {
            value: config.logoScale,
          },
          uGradientMap: { value: gradientTexture },
        },

        vertexShader: `

        varying vec2 vUv;

        void main(){

          vUv=uv;

          gl_Position=
            projectionMatrix*
            modelViewMatrix*
            vec4(position,1.0);

        }

        `,

        fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform sampler2D uNoiseMap;
      uniform float uWarpStrength;
      uniform sampler2D uLogo;
      uniform float uLogoScale;
      uniform sampler2D uGradientMap;

      float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      float noise(vec2 p) {
          vec2 i = floor(p); vec2 f = fract(p);
          f = f*f*(3.0-2.0*f);
          float a = hash(i); float b = hash(i+vec2(1.0,0.0));
          float c = hash(i+vec2(0.0,1.0)); float d = hash(i+vec2(1.0,1.0));
          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      float fbm(vec2 p) {
          float v = 0.0; float a = 0.5;
          for(int i=0; i<5; i++) { v += noise(p)*a; p *= 2.0; a *= 0.5; }
          return v;
      }

      float getEdge(float mask) {
        return fwidth(mask);
      }

      void main() {
          vec2 warpNoise = texture2D(uNoiseMap, vUv).rg * 2.0 - 1.0;
          vec2 uv = vUv + warpNoise * uWarpStrength;

          vec2 p1 = vec2(0.5 + 0.35 * sin(uTime * 0.4), 0.5 + 0.3 * cos(uTime * 0.3));
          vec2 p2 = vec2(0.5 + 0.4 * cos(uTime * 0.5), 0.5 + 0.4 * sin(uTime * 0.2));
          vec2 p3 = vec2(0.5 + 0.2 * sin(uTime * 0.6), 0.5 + 0.2 * cos(uTime * 0.7));
          vec2 p4 = vec2(0.5 + 0.3 * cos(uTime * 0.3), 0.5 + 0.2 * sin(uTime * 0.5));
          vec2 p5 = vec2(0.5 + 0.4 * sin(uTime * 0.2), 0.5 + 0.3 * cos(uTime * 0.4));
          //vec2 p6 = vec2(0.5 + 0.25 * cos(uTime * 0.7), 0.5 + 0.35 * sin(uTime * 0.6));

          vec2 centeredUv = (vUv - 0.5) / uLogoScale + 0.5;
          float logoAlpha = 0.0;
          if(centeredUv.x >= 0.0 && centeredUv.x <= 1.0 && centeredUv.y >= 0.0 && centeredUv.y <= 1.0) {
              logoAlpha = texture2D(uLogo, centeredUv).a;
          }

          // Paralax
          vec2 refraction = mix(warpNoise * uWarpStrength, -warpNoise * (uWarpStrength * 0.2), logoAlpha);
          vec2 finalUv = vUv + refraction;

          float d = 0.0;
          d += 0.05 / dot(finalUv - p1, finalUv - p1);
          d += 0.05 / dot(finalUv - p2, finalUv - p2);
          d += 0.05 / dot(finalUv - p3, finalUv - p3);
          d += 0.05 / dot(finalUv - p4, finalUv - p4);
          d += 0.05 / dot(finalUv - p5, finalUv - p5);
          //d += 0.05 / dot(finalUv - p6, finalUv - p6);

          float blobs = smoothstep(0.7, 0.9, d);

          vec3 colorBg = vec3(0.08, 0.06, 0.05); 

          float intensity = d * 1.5;
          vec3 blobsColor = texture2D(uGradientMap, vec2(clamp(intensity, 0.0, 1.0), 0.5)).rgb;
          float mask = step(0.05, d);
          blobsColor = mix(colorBg, blobsColor, mask);

          vec3 finalColor = mix(blobsColor, colorBg, logoAlpha);

          gl_FragColor = vec4(finalColor, 1.0);
      }
      `,
      });

      const testPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 2),
        gradientMaterial,
      );

      scene.add(testPlane);

      // ======================================================
      // GUI
      // ======================================================

      const gui = new GUI();

      gui
        .add(config, "stripesCount", 1, 100, 1)
        .onChange((v) => (glassMaterial.uniforms.uStripesCount.value = v));

      gui.add(config, "reedStrength", 0, 1).onChange((v) => {
        glassMaterial.uniforms.uReedStrength.value = v;
      });

      gui.add(config, "chromaticStrength", 0, 1).onChange((v) => {
        glassMaterial.uniforms.uChromaticStrength.value = v;
      });
      gui
        .add(config, "blurStrength", 0, 10)
        .onChange((v) => (glassMaterial.uniforms.uBlurStrength.value = v));

      gui
        .addColor(config, "glassColor")
        .onChange((v) => glassMaterial.uniforms.uGlassColor.value.set(v));

      gui
        .add(config, "glassOpacity", 0, 1)
        .onChange((v) => (glassMaterial.uniforms.uGlassOpacity.value = v));

      gui
        .add(config, "grainStrength", 0, 0.2)
        .onChange((v) => (glassMaterial.uniforms.uGrainStrength.value = v));

      gui
        .add(config, "logoScale", 0, 2)
        .onChange((v) => (gradientMaterial.uniforms.uLogoScale.value = v));

      gui
        .add(config, "warpStrength", 0, 2)
        .onChange((v) => (gradientMaterial.uniforms.uWarpStrength.value = v));

      // ======================================================
      // RESIZE
      // ======================================================

      window.addEventListener("resize", () => {
        camera.updateProjectionMatrix();

        renderer.setSize(innerWidth, innerHeight);

        renderTarget.setSize(innerWidth, innerHeight);

        glassMaterial.uniforms.uResolution.value.set(innerWidth, innerHeight);
      });

      // ======================================================
      // LOOP
      // ======================================================

      function animate() {
        requestAnimationFrame(animate);

        const t = performance.now() * 0.001;

        glassMaterial.uniforms.uTime.value = t;

        gradientMaterial.uniforms.uTime.value = t;

        renderer.setRenderTarget(renderTarget);

        renderer.render(scene, camera);

        glassMaterial.uniforms.uScene.value = renderTarget.texture;

        renderer.setRenderTarget(null);

        renderer.render(quadScene, quadCamera);
      }

      animate();
    </script>
  </body>
</html>
