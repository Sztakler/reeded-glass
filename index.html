<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeded glass</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        touch-action: none;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GUI } from "three/addons/libs/lil-gui.module.min.js";

      // --- SCENE SETUP ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#1a1a1a");

      // Camera
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0, 5);

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // Controls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // Lighting
      const ambientLight = new THREE.AmbientLight("#ffffff", 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight("#ffffff", 1.5);
      dirLight.position.set(5, 5, 5);
      scene.add(dirLight);

      // --- RENDER TARGET SETUP (Przechwytywanie ekranu) ---
      const renderTarget = new THREE.WebGLRenderTarget(
        window.innerWidth * window.devicePixelRatio,
        window.innerHeight * window.devicePixelRatio,
        {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
        },
      );

      // --- BACKGROUND OBJECTS ---
      const torusKnotGeo = new THREE.TorusKnotGeometry(0.5, 0.18, 120, 16);
      const torusKnotMat = new THREE.MeshStandardMaterial({
        color: "#ff2a5f",
        roughness: 0.2,
        metalness: 0.1,
      });
      const backgroundMesh = new THREE.Mesh(torusKnotGeo, torusKnotMat);
      backgroundMesh.position.set(0, 0, -1);
      scene.add(backgroundMesh);

      // --- CONFIGURATION OBJECT ---
      const config = {
        rotationSpeed: 0.01,
        stripesCount: 15.0,
        edgeShadow: 0.2,
        edgeBlink: 0.15,
        refractionStrength: 0.25,
        blurStrength: 4.0,
      };

      // --- CUSTOM REED GLASS SHADER ---
      const vertexShader = `
        varying vec2 vUv;
        varying vec4 vScreenPosition;

        void main() {
          vUv = uv;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mvPosition;
          vScreenPosition = gl_Position;
        }
      `;

      const fragmentShader = `
        varying vec2 vUv;
        varying vec4 vScreenPosition;

        uniform sampler2D uTransmissionMap;
        uniform float uStripesCount;
        uniform float uEdgeShadow;
        uniform float uEdgeBlink;
        uniform float uRefractionStrength;
        uniform float uBlurStrength;

        void main() {
          vec2 screenUV = (vScreenPosition.xy / vScreenPosition.w) * 0.5 + 0.5;

          // Divide into stripes
          float stripeX = fract(vUv.x * uStripesCount);

          // Add refraction
          float refractionOffset = sin((stripeX - 0.5) * 3.14159265);
          
          vec2 distortedUV = screenUV;
          distortedUV.x += refractionOffset * uRefractionStrength * 0.1;

          // Take texture samples
          vec4 textureBlur = vec4(0.0);
          float blurStep = uBlurStrength * 0.001;
          
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, -blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, -blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(-blurStep, blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV + vec2(blurStep, blurStep));
          textureBlur += texture2D(uTransmissionMap, distortedUV) * 2.0;
          textureBlur /= 6.0;

          // Base tinted color for the glass plane
          vec3 baseColor = textureBlur.rgb;

          // Shadow and blink
          float shadow = smoothstep(0.0, uEdgeShadow, stripeX);
          float blink = smoothstep(1.0 - uEdgeBlink, 1.0, stripeX);

          vec3 finalColor = baseColor * shadow + (vec3(1.0) * blink * 0.25);

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `;

      const glassGeo = new THREE.PlaneGeometry(2.5, 2.5);
      const glassMat = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
          uTransmissionMap: { value: null },
          uStripesCount: { value: config.stripesCount },
          uEdgeShadow: { value: config.edgeShadow },
          uEdgeBlink: { value: config.edgeBlink },
          uRefractionStrength: { value: config.refractionStrength },
          uBlurStrength: { value: config.blurStrength },
        },
        transparent: false,
      });

      const glassMesh = new THREE.Mesh(glassGeo, glassMat);
      glassMesh.position.set(0, 0, 0.5);
      scene.add(glassMesh);

      // --- GUI CONFIGURATION ---
      const gui = new GUI({ title: "Glass Parameters" });
      gui.add(config, "rotationSpeed", 0, 0.05).name("Background speed");
      gui
        .add(config, "stripesCount", 5, 50, 1)
        .name("Number of stripes")
        .onChange((v) => (glassMat.uniforms.uStripesCount.value = v));
      gui
        .add(config, "edgeShadow", 0.01, 0.5)
        .name("Shadow width")
        .onChange((v) => (glassMat.uniforms.uEdgeShadow.value = v));
      gui
        .add(config, "edgeBlink", 0.01, 0.5)
        .name("Blink width")
        .onChange((v) => (glassMat.uniforms.uEdgeBlink.value = v));
      gui
        .add(config, "refractionStrength", 0.0, 1.0)
        .name("Refraction strength")
        .onChange((v) => (glassMat.uniforms.uRefractionStrength.value = v));
      gui
        .add(config, "blurStrength", 0.0, 10.0)
        .name("Frosted blur")
        .onChange((v) => (glassMat.uniforms.uBlurStrength.value = v));

      // Resize handler
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderTarget.setSize(
          window.innerWidth * window.devicePixelRatio,
          window.innerHeight * window.devicePixelRatio,
        );
      });

      // --- CUSTOM ANIMATION & TWO-PASS RENDER LOOP ---
      function animate() {
        requestAnimationFrame(animate);

        // Background animation
        backgroundMesh.rotation.x += config.rotationSpeed;
        backgroundMesh.rotation.y += config.rotationSpeed * 0.5;
        controls.update();

        // Render background only to the renderTarget buffer
        glassMesh.visible = false;
        renderer.setRenderTarget(renderTarget);
        renderer.render(scene, camera);

        // Pass rendered background to the shader and apply glass effect
        glassMat.uniforms.uTransmissionMap.value = renderTarget.texture;
        glassMesh.visible = true;
        renderer.setRenderTarget(null);
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
