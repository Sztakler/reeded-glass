<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeded Glass - Poster Effect</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap");

      body {
        margin: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        touch-action: none;
        font-family: "Inter", sans-serif;
        color: #e2ff00;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .poster-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        box-sizing: border-box;
        padding: 5vw;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .main-title {
        font-size: clamp(3.5rem, 8vw, 7rem);
        font-weight: 700;
        line-height: 0.85;
        letter-spacing: -0.04em;
        margin: 0;
      }

      .subtitle {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.02em;
        margin-top: 1.5rem;
        max-width: 400px;
      }

      .upload-container {
        position: absolute;
        bottom: 5vw;
        left: 5vw;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 15ch;
        text-align: center;
        width: 100%;
      }

      .custom-file-upload {
        padding: 10px 16px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 0.85rem;
        backdrop-filter: blur(5px);
        width: fit-content;
        min-width: 16ch;
      }

      .upload-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .preview-box {
        width: 60px;
        height: 60px;
        width: auto;
        position: relative;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .preview-box img {
        width: auto;
        height: 100%;
        max-width: 200px;
        object-fit: cover;
        border-radius: 4px;
      }

      .remove-btn {
        background: #dc232c;
        color: #f7e9f9;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- 3D Layer -->
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GUI } from "three/addons/libs/lil-gui.module.min.js";

      // ======================================================
      // CONFIG
      // ======================================================

      const config = {
        stripesCount: 80,

        reedStrength: 0.05,

        chromaticStrength: 0.01,

        blurStrength: 40.0,

        glassColor: "#ffffff",
        glassOpacity: 0.0,

        grainStrength: 0.12,
        warpStrength: 0.12,
        gradientSpeed: 0.12,
        cloudDensity: 3.0,
        cloudSize: 0.6,
      };
      // ======================================================
      // RENDERER
      // ======================================================

      const container = document.getElementById("canvas-container");

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
      });

      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

      renderer.setSize(innerWidth, innerHeight);

      container.appendChild(renderer.domElement);

      // ======================================================
      // CAMERAS
      // ======================================================

      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);

      camera.position.z = 1;

      // ======================================================
      // SOURCE SCENE
      // ======================================================

      const scene = new THREE.Scene();

      scene.background = new THREE.Color("#0a0a0a");

      const noiseTarget = new THREE.WebGLRenderTarget(256, 256, {
        format: THREE.RGBAFormat,
        type: THREE.FloatType,
      });

      const noiseFragmentShader = `
          uniform float uTime;
          varying vec2 vUv;

          //
          // Description : Array and textureless GLSL 2D simplex noise function.
          //      Author : Ian McEwan, Ashima Arts.
          //  Maintainer : stegu
          //     Lastmod : 20110822 (ijm)
          //     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
          //               Distributed under the MIT License. See LICENSE file.
          //               https://github.com/ashima/webgl-noise
          //               https://github.com/stegu/webgl-noise
          //

          vec3 mod289(vec3 x) {
            return x - floor(x * (1.0 / 289.0)) * 289.0;
          }

          vec2 mod289(vec2 x) {
            return x - floor(x * (1.0 / 289.0)) * 289.0;
          }

          vec3 permute(vec3 x) {
            return mod289(((x*34.0)+10.0)*x);
          }

          float snoise(vec2 v)
            {
            const vec4 C = vec4(0.211324865405187,  // (3.0-sqrt(3.0))/6.0
                                0.366025403784439,  // 0.5*(sqrt(3.0)-1.0)
                               -0.577350269189626,  // -1.0 + 2.0 * C.x
                                0.024390243902439); // 1.0 / 41.0
          // First corner
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);

          // Other corners
            vec2 i1;
            //i1.x = step( x0.y, x0.x ); // x0.x > x0.y ? 1.0 : 0.0
            //i1.y = 1.0 - i1.x;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            // x0 = x0 - 0.0 + 0.0 * C.xx ;
            // x1 = x0 - i1 + 1.0 * C.xx ;
            // x2 = x0 - 1.0 + 2.0 * C.xx ;
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;

          // Permutations
            i = mod289(i); // Avoid truncation effects in permutation
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
          		+ i.x + vec3(0.0, i1.x, 1.0 ));

            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ;
            m = m*m ;

          // Gradients: 41 points uniformly over a line, mapped onto a diamond.
          // The ring size 17*17 = 289 is close to a multiple of 41 (41*7 = 287)

            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;

          // Normalise gradients implicitly by scaling m
          // Approximation of: m *= inversesqrt( a0*a0 + h*h );
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );

          // Compute final noise value at P
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
          }

          void main() {
              float nx = snoise(vUv * 3.0 + uTime * 0.2);
              float ny = snoise(vUv * 3.0 + uTime * 0.3);
              gl_FragColor = vec4(nx * 0.5 + 0.5, ny * 0.5 + 0.5, 0.0, 1.0);
          }
      `;

      const textureLoader = new THREE.TextureLoader();

      const logoTexture = textureLoader.load("./images/logo.png");

      logoTexture.minFilter = THREE.LinearFilter;
      logoTexture.magFilter = THREE.LinearFilter;
      logoTexture.wrapS = THREE.ClampToEdgeWrapping;
      logoTexture.wrapT = THREE.ClampToEdgeWrapping;

      // ======================================================
      // RENDER TARGET
      // ======================================================

      const renderTarget = new THREE.WebGLRenderTarget(
        innerWidth,
        innerHeight,
        {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
          depthBuffer: false,
        },
      );

      // ======================================================
      // FULLSCREEN QUAD
      // ======================================================

      const quadScene = new THREE.Scene();

      const quadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      // ======================================================
      // GLASS SHADER
      // ======================================================

      const vertexShader = `
                  varying vec2 vUv;
                  void main() {
                      vUv = uv;
                      gl_Position = vec4(position, 1.0);
                  }
              `;

      const fragmentShader = `
                  precision highp float;
                  varying vec2 vUv;
                  uniform sampler2D uScene;
                  uniform vec2 uResolution;
                  uniform float uTime;
                  uniform float uStripesCount;
                  uniform float uReedStrength;
                  uniform float uChromaticStrength;
                  uniform float uBlurStrength;
                  uniform vec3 uGlassColor;
                  uniform float uGlassOpacity;
                  uniform float uGrainStrength;

                  float hash(vec2 p) {
                      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
                  }

                  vec3 blur(sampler2D tex, vec2 uv, float amount) {
                      vec2 px = vec2(amount / uResolution.x, 0.0);
                      vec3 col = texture2D(tex, uv).rgb * 0.4;
                      col += (texture2D(tex, uv + px).rgb + texture2D(tex, uv - px).rgb) * 0.15;
                      col += (texture2D(tex, uv + px * 2.0).rgb + texture2D(tex, uv - px * 2.0).rgb) * 0.15;
                      return col;
                  }

                  // Golden Angle Distribution blur
                  vec3 getBlurredColor(sampler2D tex, vec2 uv, vec2 distortion, float blurAmount, float chromaAmount) {
                      vec3 accumulatedColor = vec3(0.0);
                      float totalWeight = 0.0;
    
                      float goldenAngle = 2.39996323; 
    
                      for (float i = 0.0; i < 16.0; i++) {
                          float r = sqrt(i + 0.5) / sqrt(16.0); // Rozkład promienia
                          float theta = i * goldenAngle;
        
                          vec2 blurOffset = vec2(cos(theta), sin(theta)) * r * blurAmount;
        
                          vec2 sampleUv = uv + (blurOffset / uResolution);
        
                          vec2 chromaOffset = distortion * chromaAmount * (r * 0.5 + 0.5);
        
                          float redSample   = texture2D(tex, sampleUv + chromaOffset).r;
                          float greenSample = texture2D(tex, sampleUv).g;
                          float blueSample  = texture2D(tex, sampleUv - chromaOffset).b;
        
                          accumulatedColor += vec3(redSample, greenSample, blueSample);
                          totalWeight += 1.0;
                      }
    
                      return accumulatedColor / totalWeight;
                  }

                  void main() {
                      float t = fract(vUv.x * uStripesCount);
                      float x = sin(t * 3.14159265 - 1.57079633);
                      float distSq = x * x;
                      vec2 normal = vec2(x, sqrt(max(0.001, 1.0 - distSq)));

                      vec2 distortion = normal * uReedStrength * 0.5;
                      vec2 uv = vUv + distortion;

                      vec3 color = getBlurredColor(uScene, uv, normal, uBlurStrength, uChromaticStrength);
                      color = mix(color, uGlassColor, uGlassOpacity);
                      color += (hash(gl_FragCoord.xy + uTime) - 0.5) * uGrainStrength;

                      // Highlights and Shadows
                      vec3 reflection = texture2D(uScene, uv + (normal * 0.1)).rgb;
                      float edgeHighlight = pow(abs(normal.x), 2.0);
                      color = mix(color, reflection * 1.5, edgeHighlight * 0.3);

                      gl_FragColor = vec4(color, 1.0);
                  }
              `;

      // ======================================================
      // MATERIAL
      // ======================================================

      const glassMaterial = new THREE.ShaderMaterial({
        vertexShader,

        fragmentShader,

        uniforms: {
          uScene: {
            value: null,
          },

          uResolution: {
            value: new THREE.Vector2(innerWidth, innerHeight),
          },

          uTime: {
            value: 0,
          },

          uStripesCount: {
            value: config.stripesCount,
          },

          uReedStrength: {
            value: config.reedStrength,
          },

          uChromaticStrength: {
            value: config.chromaticStrength,
          },
          uBlurStrength: {
            value: config.blurStrength,
          },

          uGlassColor: {
            value: new THREE.Color(config.glassColor),
          },

          uGlassOpacity: {
            value: config.glassOpacity,
          },

          uGrainStrength: {
            value: config.grainStrength,
          },
        },
      });

      const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), glassMaterial);

      quadScene.add(quad);

      function createGradientTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 512;
        canvas.height = 1;
        const ctx = canvas.getContext("2d");

        const grad = ctx.createLinearGradient(0, 0, 512, 0);

        grad.addColorStop(0.0, "rgb(10, 10, 12)");
        grad.addColorStop(0.9, "rgb(245, 235, 220)");
        grad.addColorStop(0.5, "rgb(31, 62, 214)");

        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 1);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        return texture;
      }

      const gradientTexture = createGradientTexture();

      const gradientMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: {
            value: 0,
          },
          uNoiseMap: {
            value: noiseTarget.texture,
          },
          uCloudDensity: {
            value: config.cloudDensity,
          },
          uCloudSize: {
            value: config.cloudSize,
          },
          uWarpStrength: { value: config.warpStrength },
          uGradientMap: { value: gradientTexture },
          uAspect: { value: innerWidth / innerHeight },
        },

        vertexShader: `

        varying vec2 vUv;

        void main(){

          vUv=uv;

          gl_Position=
            projectionMatrix*
            modelViewMatrix*
            vec4(position,1.0);

        }

        `,

        fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uCloudDensity;
      uniform sampler2D uNoiseMap;
      uniform float uWarpStrength;
      uniform sampler2D uGradientMap;
      uniform float uAspect;
      uniform float uCloudSize;

      float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      float noise(vec2 p) {
          vec2 i = floor(p); vec2 f = fract(p);
          f = f*f*(3.0-2.0*f);
          float a = hash(i); float b = hash(i+vec2(1.0,0.0));
          float c = hash(i+vec2(0.0,1.0)); float d = hash(i+vec2(1.0,1.0));
          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      float fbm(vec2 p) {
          float v = 0.0; float a = 0.5;
          for(int i=0; i<5; i++) { v += noise(p)*a; p *= 2.0; a *= 0.5; }
          return v;
      }

      float getEdge(float mask) {
        return fwidth(mask);
      }

      void main() {
          vec2 aspectUv = vUv;
          aspectUv.x = (aspectUv.x - 0.5) * uAspect + 0.5;
          vec2 warpNoise = texture2D(uNoiseMap, vUv).rg * 2.0 - 1.0;
          vec2 uv = aspectUv + warpNoise * uWarpStrength;
          float t = uTime;

          vec2 p1 = vec2(0.5 + 0.35 * sin(t * 0.4), 0.5 + 0.3 * cos(t * 0.3));
          vec2 p2 = vec2(0.5 + 0.4 * cos(t * 0.5), 0.5 + 0.4 * sin(t * 0.2));
          vec2 p3 = vec2(0.5 + 0.2 * sin(t * 0.6), 0.5 + 0.2 * cos(t * 0.7));
          vec2 p4 = vec2(0.5 + 0.3 * cos(t * 0.3), 0.5 + 0.2 * sin(t * 0.5));
          vec2 p5 = vec2(0.5 + 0.4 * sin(t * 0.2), 0.5 + 0.3 * cos(t * 0.4));


          // Paralax
          vec2 refraction = mix(warpNoise * uWarpStrength, -warpNoise * (uWarpStrength * 0.2), 0.0);
          vec2 finalUv = aspectUv + refraction;

          float R = uCloudSize;
          float d1 = smoothstep(R, 0.0, length(finalUv - p1));
          float d2 = smoothstep(R, 0.0, length(finalUv - p2));
          float d3 = smoothstep(R, 0.0, length(finalUv - p3));
          float d4 = smoothstep(R, 0.0, length(finalUv - p4));
          float d5 = smoothstep(R, 0.0, length(finalUv - p5));

          float d = max(d1, max(d2, max(d3, max(d4, d5))));
          float blobs = smoothstep(0.7, 0.9, d);

          vec3 colorBg = vec3(0.0, 0.02745, 0.1843);

          vec2 noiseOffset = vec2(t * 0.1, t * 0.05);

          float cloudNoise = fbm(finalUv * uCloudDensity - noiseOffset);

          float intensity = clamp(d * 0.8 + cloudNoise * 0.2, 0.0, 1.0);

          vec3 blobsColor = texture2D(uGradientMap, vec2(intensity, 0.5)).rgb;

          vec3 finalColor = mix(blobsColor, colorBg, 0.0);

          gl_FragColor = vec4(finalColor, 1.0);
      }
      `,
      });

      // Creating the noise texture
      const noiseScene = new THREE.Scene();
      const noiseCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      const noiseMaterial = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: noiseFragmentShader,
        uniforms: {
          uTime: { value: 0 },
        },
      });

      const noiseQuad = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 2),
        noiseMaterial,
      );
      noiseScene.add(noiseQuad);

      const gradientPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 2),
        gradientMaterial,
      );

      scene.add(gradientPlane);

      // ======================================================
      // GUI
      // ======================================================

      const gui = new GUI();

      gui
        .add(config, "stripesCount", 1, 100, 1)
        .onChange((v) => (glassMaterial.uniforms.uStripesCount.value = v));

      gui.add(config, "reedStrength", 0, 1).onChange((v) => {
        glassMaterial.uniforms.uReedStrength.value = v;
      });

      gui.add(config, "chromaticStrength", 0, 1).onChange((v) => {
        glassMaterial.uniforms.uChromaticStrength.value = v;
      });
      gui
        .add(config, "blurStrength", 0, 100)
        .onChange((v) => (glassMaterial.uniforms.uBlurStrength.value = v));

      gui
        .addColor(config, "glassColor")
        .onChange((v) => glassMaterial.uniforms.uGlassColor.value.set(v));

      gui
        .add(config, "glassOpacity", 0, 1)
        .onChange((v) => (glassMaterial.uniforms.uGlassOpacity.value = v));

      gui
        .add(config, "grainStrength", 0, 0.2)
        .onChange((v) => (glassMaterial.uniforms.uGrainStrength.value = v));

      gui
        .add(config, "warpStrength", 0, 2)
        .onChange((v) => (gradientMaterial.uniforms.uWarpStrength.value = v));

      gui
        .add(config, "gradientSpeed", 0, 2)
        .onChange((v) => (config.gradientSpeed = v));

      gui
        .add(config, "cloudDensity", 0, 5)
        .onChange((v) => (gradientMaterial.uniforms.uCloudDensity.value = v));

      gui
        .add(config, "cloudSize", 0, 4)
        .onChange((v) => (gradientMaterial.uniforms.uCloudSize.value = v));

      // ======================================================
      // RESIZE
      // ======================================================

      window.addEventListener("resize", () => {
        const aspect = innerWidth / innerHeight;

        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        renderTarget.setSize(innerWidth, innerHeight);

        gradientMaterial.uniforms.uAspect.value = aspect;
        glassMaterial.uniforms.uResolution.value.set(innerWidth, innerHeight);
      });

      // ======================================================
      // LOOP
      // ======================================================

      let lastTime = performance.now();
      let accumulatedTime = 0.0;

      function animate() {
        requestAnimationFrame(animate);

        const currentTime = performance.now();
        const delta = (currentTime - lastTime) * 0.001;
        lastTime = currentTime;

        accumulatedTime += delta * config.gradientSpeed;

        noiseMaterial.uniforms.uTime.value = accumulatedTime;

        glassMaterial.uniforms.uTime.value = accumulatedTime;

        gradientMaterial.uniforms.uTime.value = accumulatedTime;

        // Generate noise
        renderer.setRenderTarget(noiseTarget);
        renderer.render(noiseScene, noiseCamera);

        // Render background
        renderer.setRenderTarget(renderTarget);

        renderer.render(scene, camera);

        // Final render with glass shader
        glassMaterial.uniforms.uScene.value = renderTarget.texture;

        renderer.setRenderTarget(null);

        renderer.render(quadScene, quadCamera);
      }

      animate();
    </script>
  </body>
</html>
